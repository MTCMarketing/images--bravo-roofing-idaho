name: Process Delete Queue (TEST)

on:
  push:
    paths:
      - "delete-queue/**"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Write test file
        run: |
          echo "I was triggered by delete-queue at $(date)" > delete-queue/_ran.txt

      - name: Commit test file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add delete-queue/_ran.txt

          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Test: delete-queue workflow ran"
            git push
          fi
