name: Process Delete Queue (DRY RUN)

on:
  push:
    paths:
      - "delete-queue/**"

permissions:
  contents: write

concurrency:
  group: process-delete-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  delete:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Process changes (DELETE + UPDATE + RENAME - DRY RUN)
        run: |
          node <<'EOF'
          const fs = require('fs');
          const path = require('path');

          const queueDir = path.join(process.cwd(), 'delete-queue');
          const imagesDir = path.join(process.cwd(), 'images');
          const filesJsonPath = path.join(imagesDir, 'files.json');

          const repo = process.env.GITHUB_REPOSITORY.split('/')[1];
          const owner = process.env.GITHUB_REPOSITORY.split('/')[0];
          const baseUrl = `https://${owner.toLowerCase()}.github.io/${repo}`;

          if (!fs.existsSync(queueDir)) process.exit(0);
          if (!fs.existsSync(filesJsonPath)) process.exit(1);

          const originalData = JSON.parse(fs.readFileSync(filesJsonPath, 'utf-8'));
          const testData = JSON.parse(JSON.stringify(originalData));

          const queueFiles = fs.readdirSync(queueDir)
            .filter(f => f.startsWith('batch-') && f.endsWith('.json'));

          let logLines = [];

          queueFiles.forEach(file => {
            const payload = JSON.parse(fs.readFileSync(path.join(queueDir, file), 'utf-8'));

            if (!Array.isArray(payload.changes)) return;

            payload.changes.forEach(change => {

              const id = String(change.id || "");

              const entryKey = Object.keys(testData).find(k => {
                const name = testData[k]?.name || "";
                return k === id || name.startsWith(id);
              });

              if (!entryKey) {
                logLines.push(`No match for ID: ${id}`);
                return;
              }

              // =====================
              // DELETE
              // =====================
              if (change.action === 'delete') {
                logLines.push(`Would delete: ${testData[entryKey].name}`);
                delete testData[entryKey];
              }

              // =====================
              // UPDATE
              // =====================
              else if (change.action === 'update' && change.attribute) {
                logLines.push(`Would update: ${testData[entryKey].name} → ${change.attribute}`);
                testData[entryKey][change.attribute] = change.value;
              }

              // =====================
              // RENAME
              // =====================
              else if (change.action === 'rename' && change.value) {
                const newName = change.value;

                logLines.push(`Would rename: ${testData[entryKey].name} → ${newName}`);

                // simulate rename in JSON
                testData[entryKey].name = newName;
                testData[entryKey].path = `${baseUrl}/images/${newName}`;
              }

              else {
                logLines.push(`Skipping invalid change: ${JSON.stringify(change)}`);
              }

            });
          });

          // WRITE LOG
          fs.writeFileSync(
            path.join(queueDir, '_dry-run-log.txt'),
            logLines.join('\n') || 'No changes'
          );

          // WRITE TEST JSON
          fs.writeFileSync(
            path.join(queueDir, 'files-test.json'),
            JSON.stringify(testData, null, 2)
          );

          EOF

      - name: Commit dry run results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add delete-queue/_dry-run-log.txt delete-queue/files-test.json || true

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Dry run delete + update + rename"
            git push origin HEAD:${{ github.ref_name }}
          fi
