name: Process Delete Queue (DRY RUN)

on:
  push:
    paths:
      - "delete-queue/**"

permissions:
  contents: write

concurrency:
  group: process-delete-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  delete:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Process changes (DELETE + UPDATE - DRY RUN)
        run: |
          node <<'EOF'
          const fs = require('fs');
          const path = require('path');

          const queueDir = path.join(process.cwd(), 'delete-queue');
          const imagesDir = path.join(process.cwd(), 'images');
          const filesJsonPath = path.join(imagesDir, 'files.json');

          if (!fs.existsSync(queueDir)) {
            console.log("No delete-queue folder");
            process.exit(0);
          }

          if (!fs.existsSync(filesJsonPath)) {
            console.log("files.json missing");
            process.exit(1);
          }

          const originalData = JSON.parse(fs.readFileSync(filesJsonPath, 'utf-8'));
          const testData = JSON.parse(JSON.stringify(originalData));

          const queueFiles = fs.readdirSync(queueDir)
            .filter(f => f.startsWith('batch-') && f.endsWith('.json'));

          if (queueFiles.length === 0) {
            console.log("No batch files found");
            process.exit(0);
          }

          let logLines = [];

          queueFiles.forEach(file => {
            const fullPath = path.join(queueDir, file);

            try {
              const payload = JSON.parse(fs.readFileSync(fullPath, 'utf-8'));

              if (!Array.isArray(payload.changes)) {
                console.log("Skipping invalid batch:", file);
                return;
              }

              payload.changes.forEach(change => {

                // =====================
                // DELETE
                // =====================
                if (change.action === 'delete' && change.id) {
                  const id = String(change.id);

                  const matches = Object.keys(testData).filter(k => {
                    const name = testData[k]?.name || "";
                    return k === id || name.startsWith(id);
                  });

                  if (matches.length === 0) {
                    logLines.push(`No match for DELETE ID: ${id}`);
                  }

                  matches.forEach(key => {
                    logLines.push(`Would delete: ${testData[key].name}`);
                    delete testData[key];
                  });
                }

                // =====================
                // UPDATE
                // =====================
                else if (change.action === 'update' && change.id && change.attribute) {
                  const id = String(change.id);

                  const entryKey = Object.keys(testData).find(k => {
                    const name = testData[k]?.name || "";
                    return k === id || name.startsWith(id);
                  });

                  if (!entryKey) {
                    logLines.push(`No match for UPDATE ID: ${id}`);
                    return;
                  }

                  const attr = change.attribute;
                  const value = change.value;

                  logLines.push(`Would update: ${testData[entryKey].name} → ${attr}`);

                  // 🔥 Apply update
                  testData[entryKey][attr] = value;
                }

                else {
                  console.log("Skipping invalid change:", change);
                }

              });

            } catch (err) {
              console.log("Error reading batch:", file, err.message);
            }
          });

          // =====================
          // WRITE LOG
          // =====================
          const logPath = path.join(queueDir, '_dry-run-log.txt');
          fs.writeFileSync(logPath, logLines.join('\n') || 'No changes applied');
          console.log("Wrote log:", logPath);

          // =====================
          // WRITE TEST JSON
          // =====================
          const testJsonPath = path.join(queueDir, 'files-test.json');
          fs.writeFileSync(testJsonPath, JSON.stringify(testData, null, 2));
          console.log("Wrote test JSON:", testJsonPath);

          EOF

      - name: Commit dry run results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add delete-queue/_dry-run-log.txt delete-queue/files-test.json || true

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Dry run delete + update changes"
            git push origin HEAD:${{ github.ref_name }}
          fi
