import { STATIC_IMAGES } from "./static-images";
import { getToken } from "../openbase/openbase";
import { FILES_JSON_URL, UPLOAD_ENDPOINT, UPDATE_ENDPOINT } from "./keys";

// imageApi.ts
// Single source of truth for all gallery images.
//
// fetchFiles() returns:
//   1. CMS-uploaded images from files.json  (newest first, isStatic: false)
//   2. Built-in static project images       (always present, isStatic: true)
//
// To swap the backend, replace bravoRoofingImageApi with a new object that
// satisfies ImageApiAdapter — no component code changes needed (MTC-BRI-03).




// ── Shared types ──────────────────────────────────────────────────────────────
export type ImageRecord = {
  id: string;
  path: string;
  name: string;
  isStatic?: boolean;         // true = built-in image, cannot be deleted via CMS
  meta?: Record<string, any>;
};

export type UploadResult = {
  webpUrl?: string;
  downloadUrl?: string;
  pagesUrl?: string;
};

// ── Unified change payload (MTC-BRI-18) ───────────────────────────────────────
// Everything mutative — delete, rename, meta updates — flows through a single
// batched endpoint. This is the discriminated union the worker accepts.
export type ImageChange =
  | { action: "delete"; id: string }
  | { action: "rename"; id: string; value: string }
  | { action: "update"; id: string; attribute: string; value: any };

// ── Adapter contract ──────────────────────────────────────────────────────────
export type ImageApiAdapter = {
  fetchFiles: () => Promise<ImageRecord[]>;
  uploadImage: (file: File, onProgress: (msg: string) => void) => Promise<UploadResult>;
  // Unified batch mutation — apply one or more changes in a single request.
  applyChanges: (changes: ImageChange[]) => Promise<void>;
  // Convenience wrappers around applyChanges for common single-change flows.
  deleteImage: (id: string) => Promise<void>;
  renameImage: (id: string, newName: string) => Promise<void>;
  updateMeta:  (id: string, meta: Record<string, any>) => Promise<void>;
};


// ── Helpers ───────────────────────────────────────────────────────────────────
function fileToBase64(file: File): Promise<string> {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const result = String(reader.result ?? '');
      resolve(result.split(',')[1]); // strip data:image/... prefix
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function sortByIdDesc(a: ImageRecord, b: ImageRecord): number {
  const aTime = Number(String(a.id).split('-')[0]);
  const bTime = Number(String(b.id).split('-')[0]);
  return bTime - aTime;
}

// ── Standard implementation ───────────────────────────────────────────────────
export const bravoRoofingImageApi: ImageApiAdapter = {
  async fetchFiles(): Promise<ImageRecord[]> {
    let cmsRecords: ImageRecord[] = [];

    try {
      const res = await fetch(`${FILES_JSON_URL}?v=${Date.now()}`, {
        headers: { Accept: 'application/json' },
      });

      if (res.ok) {
        const json = await res.json();
        cmsRecords = Object.entries(json ?? {}).map(([id, value]: [string, any]) => ({
          id,
          path: value?.path ?? '',
          name: value?.name ?? id,
          isStatic: false,
          meta: value?.meta ?? {},
        }));
        cmsRecords.sort(sortByIdDesc);
      }
    } catch {
      // Network failure — fall through and return static images only
    }

    // CMS uploads first (newest), then built-in static images
    return [...cmsRecords, ...STATIC_IMAGES];
  },

async uploadImage(file: File, onProgress: (msg: string) => void): Promise<UploadResult> {
  // version 2.0
  
  onProgress(`Uploading ${file.name}…`);

  const token = getToken();

  if (!token) {
    throw new Error("No auth token found");
  }

  const now = Date.now();

  const safeOriginalName = file.name
    .replace(/[^\w.\-]+/g, "-")
    .replace(/-+/g, "-")
    .replace(/^-|-$/g, "");

  const storedOriginalName = `${now}-${safeOriginalName}`;
  const originalPath = `originals/${storedOriginalName}`;
  const queuePath = `upload-queue/batch-${now}.json`;

  const queuePayload = {
    uploads: [
      {
        source: originalPath,
        name: file.name,
        meta: {}
      }
    ]
  };

  const base64 = await fileToBase64(file);

  const res = await fetch(UPLOAD_ENDPOINT, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      Authorization: `Bearer ${token}`,
    },
    body: JSON.stringify({
      fileName: file.name,
      base64,
      originalPath,
      queuePath,
      queuePayload,
    }),
  });

  const text = await res.text();

  if (!res.ok) {
    let json: any = null;
    try { json = JSON.parse(text); } catch {}
    throw new Error(json?.error ?? text ?? `Upload failed (HTTP ${res.status})`);
  }

  onProgress("Upload success!");

  let json: any = null;
  try { json = JSON.parse(text); } catch {}
  return json ?? {};
},
  // Batched mutation endpoint. All delete/rename/meta flows end up here.
  async applyChanges(changes: ImageChange[]): Promise<void> {
    if (changes.length === 0) return;

    const token = getToken();
    if (!token) throw new Error("No auth token found");

    const res = await fetch(UPDATE_ENDPOINT, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        Authorization: `Bearer ${token}`,
      },
      body: JSON.stringify({ changes }),
    });

    const text = await res.text();

    if (!res.ok) {
      let json: any = null;
      try { json = JSON.parse(text); } catch {}
      throw new Error(
        json?.error ??
          json?.githubResponse?.message ??
          json?.githubResponse?.error ??
          text ??
          `Update failed (HTTP ${res.status})`
      );
    }
  },

  async deleteImage(id: string): Promise<void> {
    return this.applyChanges([{ action: "delete", id }]);
  },

  async renameImage(id: string, newName: string): Promise<void> {
    return this.applyChanges([{ action: "rename", id, value: newName }]);
  },

  async updateMeta(id: string, meta: Record<string, any>): Promise<void> {
    return this.applyChanges([{ action: "update", id, attribute: "meta", value: meta }]);
  },
};
