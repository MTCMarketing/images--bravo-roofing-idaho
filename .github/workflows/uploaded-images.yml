# .github/workflows/process-uploaded-images.yml

# version 3
# Process Uploaded Images
# Uses upload-queue/*.json as the exact processing list.
# Keeps originals/ and upload-queue/ separate.

name: Process Uploaded Images

on:
  push:
    paths:
      - "originals/**"
      - "upload-queue/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: process-images-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  process:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
          persist-credentials: true

      - name: Pull latest branch before processing
        run: |
          git fetch origin ${{ github.ref_name }}
          git reset --hard origin/${{ github.ref_name }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install sharp
        run: |
          npm init -y
          npm install sharp

      - name: Read upload queue
        id: upload_queue
        run: |
          node <<'EOF'
          const fs = require("fs");
          const path = require("path");

          const queueDir = path.join(process.cwd(), "upload-queue");

          if (!fs.existsSync(queueDir)) {
            console.log("No upload-queue folder found.");
            fs.writeFileSync("upload-files.txt", "");
            fs.writeFileSync("upload-queue-files.txt", "");
            process.exit(0);
          }

          const queueFiles = fs
            .readdirSync(queueDir)
            .filter(f => f.startsWith("batch-") && f.endsWith(".json"))
            .sort();

          const sources = [];
          const queuePaths = [];

          for (const file of queueFiles) {
            const fullPath = path.join(queueDir, file);
            queuePaths.push(path.join("upload-queue", file));

            let payload;
            try {
              payload = JSON.parse(fs.readFileSync(fullPath, "utf8"));
            } catch (err) {
              console.log(`Invalid JSON in ${file}: ${err.message}`);
              continue;
            }

            if (!Array.isArray(payload.uploads)) {
              console.log(`Skipping ${file}: uploads is not an array`);
              continue;
            }

            for (const upload of payload.uploads) {
              const source = String(upload.source || "");

              if (!source.startsWith("originals/")) {
                console.log(`Skipping invalid source: ${source}`);
                continue;
              }

              if (!fs.existsSync(path.join(process.cwd(), source))) {
                console.log(`Missing source file: ${source}`);
                continue;
              }

              if (!/\.(png|jpe?g|webp)$/i.test(source)) {
                console.log(`Skipping unsupported file type: ${source}`);
                continue;
              }

              sources.push(source);
            }
          }

          const uniqueSources = [...new Set(sources)];

          fs.writeFileSync("upload-files.txt", uniqueSources.join("\n"));
          fs.writeFileSync("upload-queue-files.txt", queuePaths.join("\n"));

          console.log("Queue files found:", queuePaths.length);
          console.log("Upload sources found:", uniqueSources.length);
          console.log(uniqueSources.join("\n") || "No valid upload sources.");
          EOF

          FILES=$(cat upload-files.txt | tr '\n' ' ')
          QUEUE_FILES=$(cat upload-queue-files.txt | tr '\n' ' ')

          echo "FILES=$FILES" >> $GITHUB_OUTPUT
          echo "QUEUE_FILES=$QUEUE_FILES" >> $GITHUB_OUTPUT

      - name: Skip if no queued uploads
        if: steps.upload_queue.outputs.FILES == ''
        run: echo "No queued uploads found. Skipping."

      - name: Convert queued images
        if: steps.upload_queue.outputs.FILES != ''
        run: |
          node process-images.js ${{ steps.upload_queue.outputs.FILES }}

      - name: Update files.json
        if: steps.upload_queue.outputs.FILES != ''
        run: |
          node <<'EOF'
          const fs = require("fs");
          const path = require("path");

          const FILE_PATH = path.join(process.cwd(), "images", "files.json");

          if (!fs.existsSync(path.dirname(FILE_PATH))) {
            fs.mkdirSync(path.dirname(FILE_PATH), { recursive: true });
          }

          if (!fs.existsSync(FILE_PATH)) {
            fs.writeFileSync(FILE_PATH, JSON.stringify({}, null, 2));
          }

          const data = JSON.parse(fs.readFileSync(FILE_PATH, "utf8"));

          const repo = process.env.GITHUB_REPOSITORY.split("/")[1];
          const owner = process.env.GITHUB_REPOSITORY.split("/")[0];
          const baseUrl = `https://${owner.toLowerCase()}.github.io/${repo}`;

          const imagesDir = path.join(process.cwd(), "images");

          if (!fs.existsSync(imagesDir)) {
            fs.mkdirSync(imagesDir, { recursive: true });
          }

          const existingNames = new Set(
            Object.values(data)
              .map(entry => entry && entry.name)
              .filter(Boolean)
          );

          const existingPaths = new Set(
            Object.values(data)
              .map(entry => entry && entry.path)
              .filter(Boolean)
          );

          const files = fs
            .readdirSync(imagesDir)
            .filter(f => f.endsWith(".webp"))
            .sort();

          let added = 0;
          let now = Date.now();

          for (const file of files) {
            const imagePath = `${baseUrl}/images/${file}`;

            if (existingNames.has(file) || existingPaths.has(imagePath)) {
              continue;
            }

            let key = String(now + added);
            while (data[key]) {
              now++;
              key = String(now + added);
            }

            data[key] = {
              path: imagePath,
              name: file,
              meta: {}
            };

            existingNames.add(file);
            existingPaths.add(imagePath);
            added++;
          }

          fs.writeFileSync(FILE_PATH, JSON.stringify(data, null, 2));
          console.log(`files.json updated. Added ${added} new image records.`);
          EOF

      - name: Remove processed upload queue files
        if: steps.upload_queue.outputs.FILES != ''
        run: |
          for file in ${{ steps.upload_queue.outputs.QUEUE_FILES }}
          do
            if [ -f "$file" ]; then
              echo "Removing processed queue file: $file"
              git rm "$file"
            fi
          done

      - name: Commit processed images + metadata + queue cleanup
        if: steps.upload_queue.outputs.FILES != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add images upload-queue

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Process uploaded images"

            git fetch origin ${{ github.ref_name }}
            git pull --rebase origin ${{ github.ref_name }}

            git push origin HEAD:${{ github.ref_name }}
          fi
