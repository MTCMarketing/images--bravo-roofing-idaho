# version 3 

name: Process Uploaded Images

on:
  push:
    paths:
      - "originals/**"

permissions:
  contents: write

concurrency:
  group: process-images-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  process:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install sharp
        run: |
          npm init -y
          npm install sharp

      - name: Get changed files
        id: changed
        run: |
          FILES=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} | tr '\n' ' ')
          echo "FILES=$FILES" >> $GITHUB_OUTPUT

      - name: Skip if no relevant files
        if: steps.changed.outputs.FILES == ''
        run: echo "No changed files. Skipping."

      # ---------------------------------------
      # PROCESS IMAGES (existing JS untouched)
      # ---------------------------------------
      - name: Convert only changed images
        if: steps.changed.outputs.FILES != ''
        run: |
          node process-images.js ${{ steps.changed.outputs.FILES }}

      # ---------------------------------------
      # FIX FILENAMES → FORCE TIMESTAMP.webp
      # ---------------------------------------
      - name: Normalize filenames
        if: steps.changed.outputs.FILES != ''
        run: |
          cd images

          for file in *.webp; do
            # extract leading timestamp
            TS=$(echo "$file" | sed -E 's/^([0-9]+).*/\1/')

            if [ "$file" != "$TS.webp" ]; then
              echo "Renaming $file → $TS.webp"
              mv "$file" "$TS.webp"
            fi
          done

      # ---------------------------------------
      # HANDLE DELETES (from originals → images)
      # ---------------------------------------
      - name: Sync deletes to images folder
        if: steps.changed.outputs.FILES != ''
        run: |
          for file in ${{ steps.changed.outputs.FILES }}; do
            if [ ! -f "$file" ]; then
              NAME=$(basename "$file")
              TS=$(echo "$NAME" | sed -E 's/^([0-9]+).*/\1/')
              TARGET="images/$TS.webp"

              if [ -f "$TARGET" ]; then
                echo "Deleting $TARGET"
                rm "$TARGET"
              fi
            fi
          done

      # ---------------------------------------
      # REBUILD files.json CLEANLY
      # ---------------------------------------
      - name: Rebuild files.json
        if: steps.changed.outputs.FILES != ''
        run: |
          node <<'EOF'
          const fs = require('fs');
          const path = require('path');

          const imagesDir = path.join(process.cwd(), 'images');
          const filePath = path.join(imagesDir, 'files.json');

          const repo = process.env.GITHUB_REPOSITORY.split('/')[1];
          const owner = process.env.GITHUB_REPOSITORY.split('/')[0].toLowerCase();
          const baseUrl = `https://${owner}.github.io/${repo}`;

          const files = fs.readdirSync(imagesDir)
            .filter(f => f.endsWith('.webp'));

          const data = {};

          files.forEach(file => {
            const key = file.replace('.webp', '');

            data[key] = {
              path: `${baseUrl}/images/${file}`,
              name: file,
              meta: {}
            };
          });

          fs.writeFileSync(filePath, JSON.stringify(data, null, 2));
          console.log("files.json rebuilt cleanly");
          EOF

      # ---------------------------------------
      # COMMIT
      # ---------------------------------------
      - name: Commit processed images + metadata
        if: steps.changed.outputs.FILES != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add images

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Fix image processing (names + deletes + metadata)"
            git push
          fi
